sensor:
  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Daily Generator Production"
    id: daily_generator_production
    register_type: holding
    address: 62
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: "total_increasing"
    accuracy_decimals: 1
    filters:
      - multiply: 0.1
    value_type: U_WORD
    icon: "mdi:generator-portable"

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Total Generator Production"
    id: total_generator_production
    register_type: holding
    address: 92
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: "total_increasing"
    accuracy_decimals: 1
    value_type: U_DWORD_R
    filters:
      - multiply: 0.1
    icon: "mdi:generator-stationary"

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Generator L1 Voltage"
    id: generator_l1_voltage
    register_type: holding
    address: 181
    unit_of_measurement: "V"
    device_class: voltage
    accuracy_decimals: 1
    filters:
      - multiply: 0.1
    value_type: U_WORD
    icon: "mdi:lightning-bolt"

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Generator Frequency"
    register_type: holding
    address: 196
    unit_of_measurement: "Hz"
    device_class: frequency
    accuracy_decimals: 2
    filters:
      - multiply: 0.01
    value_type: U_WORD
    icon: "mdi:engine"

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    name: "Generator Power Total"
    id: generator_power_total
    register_type: holding
    address: 166
    unit_of_measurement: "W"
    device_class: power
    accuracy_decimals: 0
    value_type: S_WORD
    icon: "mdi:engine"

  - platform: modbus_controller
    modbus_controller_id: ${modbus_controller_id}
    register_type: holding
    address: 195
    name: "Generator Raw Value"
    id: gen_raw_195

  # 1. อ่านค่า Bit 0-3 (Relay Status)
  - platform: modbus_controller
    modbus_controller_id: deye_modbus_controller
    name: "Generator Relay Status Code"
    id: gen_relay_code
    register_type: holding
    address: 195
    filters:
      - lambda: return (int(x) & 0x0F);

  # 2. อ่านค่า Bit 4-7 (Switch Signal)
  - platform: modbus_controller
    modbus_controller_id: deye_modbus_controller
    name: "Generator Switch Signal Code"
    id: gen_switch_code
    register_type: holding
    address: 195
    filters:
      - lambda: return ((int(x) >> 4) & 0x0F);

  # 3. อ่านค่า Bit 8-11 (Generator Signal)
  - platform: modbus_controller
    modbus_controller_id: deye_modbus_controller
    name: "Generator Signal Code"
    id: gen_signal_code
    register_type: holding
    address: 195
    filters:
      - lambda: return ((int(x) >> 8) & 0x0F);

text_sensor:
  - platform: template
    name: "Generator Relay Description"
    lambda: |-
      int status = int(id(gen_relay_code).state);
      if (status == 0) return {"Not Attached"};
      if (status == 1) return {"Actuation"};
      if (status == 2) return {"Vacancy"};
      if (status == 3) return {"Working/Suction"};
      return {"Unknown"};
    icon: "mdi:relay"

  - platform: template
    name: "Generator Power Status"
    lambda: |-
      int pwr = int(id(gen_switch_code).state);
      if (pwr == 0) return {"Power OFF"};
      if (pwr == 1) return {"Power ON"};
      return {"Unknown"};
    icon: "mdi:power-cycle"

select:
  - platform: modbus_controller
    use_write_multiple: true
    modbus_controller_id: ${modbus_controller_id}
    name: "Generator Port Use"
    address: 235
    value_type: U_WORD
    entity_category: config
    icon: "mdi:connection"
    optionsmap:
      "Generator Input": 0
      "SmartLoad Output": 1
      "Micro Inverter Input": 2

switch:
  - platform: modbus_controller
    use_write_multiple: true
    modbus_controller_id: ${modbus_controller_id}
    name: Generator
    id: switch_generator
    register_type: holding
    address: 234
    bitmask: 1
    entity_category: config
    icon: mdi:toggle-switch

number:
  - platform: modbus_controller
    use_write_multiple: true
    modbus_controller_id: ${modbus_controller_id}
    name: "SmartLoad Off Voltage"
    address: 236
    unit_of_measurement: "V"
    device_class: voltage
    value_type: U_WORD
    multiply: 100
    min_value: 38
    max_value: 63
    step: 0.01
    entity_category: config
    mode: box
    icon: "mdi:lightning-bolt-circle"

  - platform: modbus_controller
    use_write_multiple: true
    modbus_controller_id: ${modbus_controller_id}
    name: "SmartLoad Off SOC"
    address: 237
    unit_of_measurement: "%"
    value_type: U_WORD
    min_value: 0
    max_value: 100
    step: 1
    entity_category: config
    mode: box
    icon: "mdi:lightning-bolt-circle"

  - platform: modbus_controller
    use_write_multiple: true
    modbus_controller_id: ${modbus_controller_id}
    name: "SmartLoad On Voltage"
    address: 238
    unit_of_measurement: "V"
    device_class: voltage
    value_type: U_WORD
    multiply: 100
    min_value: 38
    max_value: 63
    step: 0.01
    entity_category: config
    mode: box
    icon: "mdi:lightning-bolt-circle"

  - platform: modbus_controller
    use_write_multiple: true
    modbus_controller_id: ${modbus_controller_id}
    name: "SmartLoad On SOC"
    address: 239
    unit_of_measurement: "%"
    value_type: U_WORD
    min_value: 0
    max_value: 100
    step: 1
    entity_category: config
    mode: box
    icon: "mdi:lightning-bolt-circle"

  - platform: modbus_controller
    use_write_multiple: true
    modbus_controller_id: ${modbus_controller_id}
    name: "Generator Operating Time"
    id: generator_operating_time
    unit_of_measurement: "h"
    device_class: duration
    entity_category: config
    register_type: holding
    min_value: 0
    max_value: 24
    step: 1
    address: 223
    value_type: U_WORD
    mode: box
    icon: "mdi:generator-stationary"

  - platform: modbus_controller
    use_write_multiple: true
    modbus_controller_id: ${modbus_controller_id}
    name: "Generator Cooling Time"
    id: generator_cooling_time
    unit_of_measurement: "h"
    device_class: duration
    entity_category: config
    register_type: holding
    min_value: 0
    max_value: 24
    step: 1
    address: 224
    value_type: U_WORD
    mode: box
    icon: "mdi:generator-stationary"

  - platform: modbus_controller
    use_write_multiple: true
    modbus_controller_id: ${modbus_controller_id}
    name: "Generator Min PV Power"
    id: generator_min_pv_power
    unit_of_measurement: "W"
    device_class: power
    entity_category: config
    register_type: holding
    min_value: 0
    max_value: 8000
    step: 1
    address: 241
    value_type: U_WORD
    mode: box
    icon: "mdi:solar-power"
